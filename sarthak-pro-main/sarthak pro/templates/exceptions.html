<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discrepancy Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Attendance System</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/exceptions">Discrepancies</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-5">
    <h2>Discrepancy Report (Current Month)</h2>
    <div class="mb-3">
        <a href="/export_exceptions_excel" class="btn btn-success">Export to Excel</a>
        <a href="/export_exceptions_pdf" class="btn btn-info">Export to PDF</a>
    </div>
    <table class="table table-bordered table-striped mt-3">
        <thead>
            <tr>
                <th>Date</th>
                <th>Employee</th>
                <th>Issue</th>
            </tr>
        </thead>
        <tbody>
            {% for exception, emp in exceptions %}
            <tr>
                <td>{{ exception.date }}</td>
                <td>{{ emp.name }}</td>
                <td>{{ exception.issue }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Home</a>
</div>
</body>
</html>
