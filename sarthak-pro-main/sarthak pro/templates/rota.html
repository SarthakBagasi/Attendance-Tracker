<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Shift Rota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Attendance System</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/employee">Employee</a></li>
        <li class="nav-item"><a class="nav-link" href="/rota">Shift Rota</a></li>
        <li class="nav-item"><a class="nav-link" href="/attendance">Attendance</a></li>
        <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-5">
    <h2>Monthly Shift Rota</h2>
    <table class="table table-bordered table-striped mt-3">
        <thead>
            <tr>
                <th>Date</th>
                <th>Employee</th>
                <th>Shift</th>
            </tr>
        </thead>
        <tbody>
            {% for rota, emp, shift in rotas %}
            <tr>
                <td>{{ rota.date }}</td>
                <td>{{ emp.name }}</td>
                <td>{{ shift.description }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-secondary">Back to Home</a>
</div>
</body>
</html>
